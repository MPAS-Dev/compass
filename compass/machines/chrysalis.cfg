
# The paths section describes paths that are used within the ocean core test
# cases.
[paths]

# A shared root directory where MPAS standalone data can be found
database_root = /lcrc/group/e3sm/public_html/mpas_standalonedata

# the path to the base conda environment where compass environments have
# been created
compass_envs = /lcrc/soft/climate/compass/chrysalis/base


# Options related to deploying a compass conda environment on supported
# machines
[deploy]

# the unix group for permissions for deployed compass environments
group = cels

# whether deployed environments should be readable outside the shared group
world_readable = true

# the compiler set to use for system libraries and MPAS builds
compiler = intel

# the compiler to use to build software (e.g. ESMF and MOAB) with spack
software_compiler = intel

# the system MPI library to use for intel compiler
mpi_intel = openmpi

# the system MPI library to use for gnu compiler
mpi_gnu = openmpi

# the base path for spack environments used by compass
spack = /lcrc/soft/climate/compass/chrysalis/spack

# whether to use the same modules for hdf5, netcdf-c, netcdf-fortran and
# pnetcdf as E3SM (spack modules are used otherwise)
use_e3sm_hdf5_netcdf = True

# whether to exclude system cmake from spack build
exclude_system_cmake = True
