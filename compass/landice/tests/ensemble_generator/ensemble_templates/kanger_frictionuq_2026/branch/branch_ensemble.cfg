# selector for ensemble template resources
[ensemble_generator]

# subdirectory within ensemble_templates/ where branch_ensemble options are located
ensemble_template = kanger_frictionuq_2026

# config options for branching an ensemble
[branch_ensemble]

# start and end numbers for runs to set up and run
# branch runs.
# It is assumed that spinup runs have already been
# conducted for these runs.
start_run = 0
end_run = 7

# Path to thermal forcing file for the mesh to be used in the branch run
TF_file_path = /global/cfs/cdirs/fanssie/MALI_projects/Kanger_configuration_2025/Kanger_MIROC5-rcp85_oceanThermalForcing_AND_runoff_1960-1989_mean.nc

# Path to SMB forcing file for the mesh to be used in the branch run
SMB_file_path = /global/cfs/cdirs/fanssie/MALI_projects/Kanger_configuration_2025/Kanger_MIROC5_refSMB_minus1_bare_land.nc

# location of spinup ensemble to branch from
spinup_test_dir = /pscratch/sd/h/hoffman2/KANGER_uq_spinup/landice/ensemble_generator/spinup_ensemble

# year of spinup simulation from which to branch runs
branch_year = 2050

# whether to only set up branch runs for filtered runs or all runs
set_up_filtered_only = True

# path to pickle file containing filtering information generated by plot_ensemble.py
ensemble_pickle_file = None
