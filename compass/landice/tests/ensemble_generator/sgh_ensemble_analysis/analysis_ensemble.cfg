# Analysis ensemble configuration
#
# Analyzes a completed ensemble run (spinup or restart).
#
# Usage:
#   compass setup -t analysis_ensemble -w /work/analysis -f analysis_ensemble.cfg
#   compass run -w /work/analysis

[ensemble_generator]
ensemble_template = sgh_ensemble

[analysis_ensemble]

# REQUIRED: Path to the ensemble work directory to analyze
# This should be a completed spinup_ensemble or restart_ensemble directory
ensemble_work_dir = /pscratch/sd/a/ahager/AIS_GHF_basalMelt_testing/sgh_stage1_32member_ensemble/landice/ensemble_generator/spinup_ensemble/

[steady_state]

# Rolling window size in years for steady-state analysis
# Larger windows: smoother, less sensitive to short-term fluctuations
# Smaller windows: more responsive to recent changes
# Default: 10.0 years
window_years = 10.0

# Relative imbalance threshold for steady state
# Steady state when: |input - output| / (|input| + |output|) < threshold
# Range: [0.0, 1.0]
# Default: 0.05 = 5% relative imbalance
# Stricter: 0.01 = 1%
# Looser: 0.10 = 10%
imbalance_threshold = 0.05

# Whether to generate plots of analysis results
# Plots saved as:
#   - subglacial_water_mass_balance.png
#   - water_mass_balance_residual.png
#   - subglacial_hydrology_timeseries.png
plot_results = True

[validation]

# Balanced accuracy threshold for data compatibility
# Both east and west Antarctic regions must exceed this threshold
# Range: [0.0, 1.0], typical: 0.65
balanced_accuracy_threshold = 0.65

# Path to specularity content TIFF file
# Set to None or comment out if not available
# If not provided here, will check ensemble_generator.cfg as fallback
spec_tiff_file = /global/cfs/cdirs/fanssie/standard_datasets/AIS_datasets/antarctica_radar_specularity_content_young2016.tiff

# Whether to generate validation plots
# Plot saved as: spec_subglacialHydro_validation.png
plot_validation = True
