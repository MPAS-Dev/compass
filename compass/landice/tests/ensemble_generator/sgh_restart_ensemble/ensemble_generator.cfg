# Restart ensemble configuration template
#
# This is a TEMPLATE. A real restart_ensemble.cfg should be generated
# using restart_scheduler.schedule_restarts() which will fill in the
# specific runs and paths for your ensemble.
#
# To create a restart ensemble after running spinup:
#
# 1. Run the sgh_ensemble_analysis test case to produce analysis_summary.json
#    compass setup -t landice/ensemble_generator/sgh_ensemble_analysis \
#        -w /work/analysis -f analysis.cfg
#    compass run -w /work/analysis
#
# 2. Schedule restarts:
#    from compass.landice.tests.ensemble_generator.sgh_restart_ensemble \
#        .restart_scheduler import schedule_restarts
#    config_file, runs = schedule_restarts(
#        '/work/analysis/sgh_ensemble_analysis/analyze_ensemble/analysis_summary.json',
#        '/work/restart_ensemble'
#    )
#
# 3. Set up and run the restart ensemble:
#    compass setup -t landice/ensemble_generator/sgh_restart_ensemble \
#        -w /work/restart_ensemble -f <config_file>
#    compass run -w /work/restart_ensemble

[ensemble_generator]
ensemble_template = sgh_ensemble

[restart_ensemble]

# REQUIRED: Path to the spinup ensemble work directory
# This should point to the spinup_ensemble directory that contains
# the run000, run001, etc. subdirectories to be restarted
spinup_work_dir = REPLACE_WITH_SPINUP_WORK_DIR

# REQUIRED: Path to the analysis_summary.json produced by sgh_ensemble_analysis
# This file contains per-run steady-state and validation results used to
# determine which runs need restarting.
# Typical path: <analysis_work_dir>/sgh_ensemble_analysis/analyze_ensemble/analysis_summary.json
analysis_summary_file = REPLACE_WITH_ANALYSIS_SUMMARY_JSON

# Maximum consecutive restart attempts per run
# After this many restarts, the run will not be restarted again
# (prevents infinite loops if a run keeps failing)
max_consecutive_restarts = 3

# Minimum simulation length (years) before attempting restart
# Runs that haven't completed this many years of simulation won't be restarted
# (ensures meaningful progress is made before each restart)
min_simulation_years_before_restart = 50.0

# Whether to automatically restart incomplete runs
# If False, only explicitly marked runs will be restarted
auto_restart_incomplete = True

# Analysis parameters (used to determine completion status)
steady_state_window_years = 10.0
steady_state_imbalance_threshold = 0.05
balanced_accuracy_threshold = 0.65

# Specularity content TIFF file for validation (optional)
# Set to None or comment out if not available
spec_tiff_file = None

[ensemble]

# Number of parallel tasks per restart job
ntasks = 128

# CFL fraction for adaptive timestepper
# Same consideration as spinup_ensemble
cfl_fraction = 0.7
